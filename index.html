<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahih al-Bukhari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;500;600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#146356;
    --primary-dark:#0C4338;
    --primary-light:#1F8A75;
    --primary-container:#f0faf7;
    --on-primary:#FBF7EE;
    --gold:#BC8A23;
    --gold-light:#E2BB5C;
    --gold-pale:#F4E6BD;
    --surface:#ffffff;
    --surface-2:#f5f5f5;
    --surface-3:#e8e8e8;
    --on-surface:#231F16;
    --on-surface-soft:#6B6354;
    --outline:#e0e0e0;
    --red:#E21B3C;
    --blue:#1368CE;
    --yellow:#D89E00;
    --green:#26890C;
    --shadow-1: 0 1px 2px rgba(35,28,10,.10), 0 1px 4px rgba(35,28,10,.08);
    --shadow-2: 0 2px 4px rgba(35,28,10,.10), 0 4px 14px rgba(35,28,10,.12);
    --shadow-3: 0 6px 12px rgba(35,28,10,.14), 0 2px 4px rgba(35,28,10,.10);
    --r-card:24px;
    --r-btn:16px;
    --r-pill:100px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:#ffffff;
    color:var(--on-surface);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  body.quiz-mode{overflow:hidden;}
  body.quiz-mode .app-shell{
    min-height:100vh;
    height:100vh;
    padding:16px 40px 20px;
  }
  body.quiz-mode .top-bar,
  body.quiz-mode .progress-track{display:none !important;}
  body.quiz-mode #screenQuiz.active{
    flex:1;
    min-height:0;
  }
  body.quiz-mode .q-card{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    max-width:none;
    border:none;
    box-shadow:none;
    padding:24px 32px 16px;
  }
  .headline{font-family:'Outfit',sans-serif;}
  .arabic{font-family:'Amiri',serif;direction:rtl;}

  /* ---------- Full-screen shell (Zoom presentation) ---------- */
  .app-shell{
    max-width:100%;
    min-height:100vh;
    margin:0 auto;
    padding:20px 48px 32px;
    display:flex;
    flex-direction:column;
  }
  @media (max-width:768px){
    .app-shell{padding:16px 20px 24px;}
  }

  .main-col{
    min-width:0;
    flex:1;
    display:flex;
    flex-direction:column;
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* Start screen */
  .top-bar{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    margin-bottom:18px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(155deg,var(--primary),var(--primary-dark));
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-1);
    flex:none;
  }
  .brand-mark svg{width:20px;height:20px;color:var(--on-primary);}
  .brand-text .eyebrow{
    font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;
  }
  .brand-text .title{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:var(--on-surface);}

  .score-chip{
    display:flex;align-items:center;gap:6px;
    background:var(--primary);
    color:var(--on-primary);
    padding:8px 14px 8px 10px;
    border-radius:var(--r-pill);
    font-weight:600;font-size:13.5px;
    box-shadow:var(--shadow-1);
    white-space:nowrap;
  }
  .score-chip svg{width:16px;height:16px;}

  .progress-track{
    width:100%;height:8px;background:var(--surface-3);border-radius:100px;overflow:hidden;margin-bottom:26px;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));
    border-radius:100px;
    transition:width .5s cubic-bezier(.4,0,.2,1);
    width:0%;
  }

  /* ---------- Screens ---------- */
  .screen{display:none;}
  .screen.active{
    display:flex;
    flex-direction:column;
    flex:1;
    justify-content:center;
    animation:fadeUp .45s cubic-bezier(.2,.7,.2,1);
  }
  .hero-card{
    background:var(--surface);
    border-radius:28px;
    box-shadow:var(--shadow-2);
    padding:56px 48px;
    text-align:center;
    border:1px solid var(--outline);
    position:relative;
    overflow:hidden;
    max-width:900px;
    margin:0 auto;
    width:100%;
  }
  .hero-card::after{display:none;}
  .hero-kicker{
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px;
  }
  .hero-title{
    font-family:'Outfit',sans-serif;font-weight:800;font-size:clamp(28px,4vw,42px);
    color:var(--primary-dark);line-height:1.15;margin:0 0 14px;
  }
  .hero-sub{
    font-size:16px;color:var(--on-surface-soft);max-width:480px;margin:0 auto 30px;line-height:1.6;
  }

  .btn{
    font-family:'Outfit',sans-serif;
    font-weight:600;font-size:15px;
    border:none;cursor:pointer;
    border-radius:var(--r-pill);
    padding:15px 32px;
    display:inline-flex;align-items:center;gap:8px;
    position:relative;overflow:hidden;
    transition:box-shadow .25s ease, transform .15s ease;
  }
  .btn-primary{background:var(--primary);color:var(--on-primary);box-shadow:var(--shadow-1);}
  .btn-primary:hover{box-shadow:var(--shadow-2);transform:translateY(-1px);}
  .btn-primary svg{width:18px;height:18px;}
  .ripple{
    position:absolute;border-radius:50%;background:rgba(255,255,255,.5);
    transform:scale(0);animation:rip .55s linear;pointer-events:none;
  }
  @keyframes rip{to{transform:scale(3.2);opacity:0;}}

  /* Question card */
  .q-card{
    background:var(--surface);
    border:1px solid var(--outline);
    border-radius:var(--r-card);
    box-shadow:var(--shadow-2);
    padding:44px 52px 40px;
    max-width:1100px;
    margin:0 auto;
    width:100%;
  }
  @media (max-width:768px){
    .q-card{padding:28px 22px 24px;}
  }
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .q-tag{
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    background:var(--gold-pale);color:var(--gold);
    padding:5px 11px;border-radius:100px;
  }
  .q-count{font-size:14px;color:var(--on-surface-soft);font-weight:600;}
  .q-text{
    font-family:'Outfit',sans-serif;font-weight:700;font-size:clamp(28px,4vw,44px);
    line-height:1.3;color:var(--on-surface);margin:0 0 36px;
  }


  .opts{display:grid;gap:14px;}
  .opts.mcq,.opts.ms,.opts.tf{grid-template-columns:1fr 1fr;}
  .opts.count-3 .opt:nth-child(3){
    grid-column:1 / -1;
    max-width:calc(50% - 7px);
    justify-self:center;
  }
  @media (max-width:640px){
    .opts.mcq,.opts.ms,.opts.tf{grid-template-columns:1fr;}
    .opts.count-3 .opt:nth-child(3){max-width:none;}
  }

  .opt{
    display:flex;align-items:center;gap:16px;
    text-align:left;
    border:none;
    border-radius:14px;
    padding:22px 24px;
    min-height:88px;
    font-family:'Inter',sans-serif;font-weight:700;font-size:clamp(17px,2vw,22px);
    color:#fff;
    cursor:default;
    box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:opacity .2s ease, box-shadow .2s ease, transform .15s ease;
  }
  .opt.c-red{background:var(--red);}
  .opt.c-blue{background:var(--blue);}
  .opt.c-yellow{background:var(--yellow);}
  .opt.c-green{background:var(--green);}

  .opt-letter{
    width:48px;height:48px;flex:none;
    border-radius:10px;
    background:rgba(255,255,255,.28);
    color:#fff;
    font-family:'Outfit',sans-serif;
    font-weight:800;font-size:26px;
    display:flex;align-items:center;justify-content:center;
    text-shadow:0 1px 2px rgba(0,0,0,.15);
  }
  .opt-text{flex:1;line-height:1.35;}

  .opt.is-correct{
    box-shadow:0 0 0 4px #fff, 0 0 0 8px #FFC107, 0 5px 0 rgba(0,0,0,.18);
    transform:scale(1.02);
  }
  .opt.dim{opacity:.35;transform:none;box-shadow:none;}

  .answer-reveal{
    display:none;
    margin-top:24px;padding:18px 22px;border-radius:14px;
    font-size:clamp(16px,1.8vw,19px);line-height:1.55;
    background:var(--primary-container);color:var(--primary-dark);
    animation:fadeUp .35s ease;
  }
  .answer-reveal.show{display:block;}
  .answer-reveal b{font-family:'Outfit',sans-serif;color:var(--primary);}

  .presenter-row{
    display:flex;justify-content:center;align-items:center;gap:14px;
    margin-top:auto;padding-top:28px;flex-wrap:wrap;
  }
  .btn-nav{
    background:#fff;color:var(--primary);border:2px solid var(--primary);
    border-radius:var(--r-pill);padding:14px 28px;
    font-family:'Outfit',sans-serif;font-weight:600;font-size:16px;
    cursor:pointer;transition:background .15s ease;
  }
  .btn-nav:hover{background:var(--primary-container);}
  .btn-nav:disabled{opacity:.35;cursor:not-allowed;}
  .btn-reveal{
    background:var(--gold);color:#fff;border:none;
    border-radius:var(--r-pill);padding:14px 32px;
    font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;
    cursor:pointer;box-shadow:var(--shadow-1);
  }
  .btn-reveal:hover{box-shadow:var(--shadow-2);}
  .btn-reveal:disabled{opacity:.4;cursor:not-allowed;}

  /* Results screen */
  .result-card{
    background:var(--surface);border:1px solid var(--outline);
    border-radius:28px;box-shadow:var(--shadow-2);
    padding:46px 38px;text-align:center;
    max-width:900px;margin:0 auto;width:100%;
  }
  .result-icon{
    width:74px;height:74px;border-radius:50%;
    background:linear-gradient(155deg,var(--gold-light),var(--gold));
    display:flex;align-items:center;justify-content:center;margin:0 auto 22px;
    box-shadow:var(--shadow-2);
  }
  .result-icon svg{width:38px;height:38px;color:#fff;}
  .result-score{font-family:'Outfit',sans-serif;font-weight:800;font-size:46px;color:var(--primary-dark);}
  .result-score span{font-size:20px;color:var(--on-surface-soft);font-weight:600;}
  .result-msg{max-width:480px;margin:18px auto 30px;color:var(--on-surface-soft);font-size:15.5px;line-height:1.65;}
  .result-cta{
    background:var(--primary-container);border-radius:18px;padding:20px 24px;margin:0 auto 30px;max-width:480px;
    text-align:left; display:flex; gap:14px; align-items:flex-start;
  }
  .result-cta svg{width:22px;height:22px;color:var(--primary);flex:none;margin-top:2px;}
  .result-cta p{margin:0;font-size:14px;color:var(--primary-dark);line-height:1.55;}
  .result-cta b{display:block;font-family:'Outfit',sans-serif;font-size:15px;margin-bottom:3px;}
  .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-ghost{
    background:transparent;color:var(--primary);border:1.5px solid var(--primary);
    font-family:'Outfit',sans-serif;font-weight:600;font-size:14.5px;
    border-radius:var(--r-pill);padding:13px 26px;cursor:pointer;
  }
  .btn-ghost:hover{background:var(--primary-container);}

</style>
</head>
<body>

<svg style="display:none">
  <symbol id="i-triangle" viewBox="0 0 24 24"><path d="M12 3.2 L21 19.5 H3 Z"/></symbol>
  <symbol id="i-diamond" viewBox="0 0 24 24"><path d="M12 2 L22 12 L12 22 L2 12 Z"/></symbol>
  <symbol id="i-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></symbol>
  <symbol id="i-square" viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="17" height="17" rx="2"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M4.5 12.5 L9.5 17.5 L19.5 6" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></symbol>

  <symbol id="i-good" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor" opacity=".15"/><path d="M7 12.5 L10.5 16 L17 8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-bad" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="currentColor" opacity=".15"/><path d="M8 8 L16 16 M16 8 L8 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></symbol>
  <symbol id="i-book" viewBox="0 0 24 24"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H11v16H5.5C4.7 20 4 19.3 4 18.5V5.5Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M20 5.5c0-.8-.7-1.5-1.5-1.5H13v16h5.5c.8 0 1.5-.7 1.5-1.5V5.5Z" fill="none" stroke="currentColor" stroke-width="1.6"/></symbol>
  <symbol id="i-star8" viewBox="0 0 24 24"><path d="M12 1 L14.5 8 L22 9 L16.5 13.5 L18.5 21 L12 17 L5.5 21 L7.5 13.5 L2 9 L9.5 8 Z" fill="currentColor"/></symbol>
  <symbol id="i-lamp" viewBox="0 0 24 24"><path d="M12 2 L9 8 H15 Z" fill="currentColor"/><path d="M9 8 C8 11 8 14 9.5 16 H14.5 C16 14 16 11 15 8 Z" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 16 H14.5 L13.5 20 H10.5 Z" fill="currentColor"/><path d="M12 20 V22" stroke="currentColor" stroke-width="1.4"/></symbol>
  <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z" fill="none" stroke="white" stroke-width="1.7"/><path d="M7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3" fill="none" stroke="white" stroke-width="1.7"/><path d="M10 15.5h4v2h-4z" fill="white"/><path d="M8 20h8v-2H8z" fill="white"/></symbol>
  <symbol id="i-sparkle" viewBox="0 0 24 24"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></symbol>
</svg>

<div class="app-shell">

  <div class="main-col">
    <div class="top-bar">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 24 24"><use href="#i-book"/></svg></div>
        <div class="brand-text">
          <div class="eyebrow">Takmeel - Hadith Studies</div>
          <div class="title">Sahih al-Bukhari</div>
        </div>
      </div>
      <div class="score-chip" id="scoreChip" style="display:none !important;">
        <svg viewBox="0 0 24 24"><use href="#i-sparkle"/></svg>
        <span id="scoreText">Score: 0</span>
      </div>
    </div>

    <div class="progress-track" id="progressTrack" style="display:none;">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- START SCREEN -->
    <section class="screen active" id="screenStart">
      <div class="hero-card">
        <h1 class="hero-title">Sahih al-Bukhari</h1>
        <button class="btn btn-primary" id="btnStart">Start Quiz</button>
      </div>
    </section>

    <!-- QUIZ SCREEN -->
    <section class="screen" id="screenQuiz">
      <div class="q-card">
        <div class="q-meta">
          <span class="q-tag" id="qTag"></span>
          <span class="q-count" id="qCount"></span>
        </div>
        <h2 class="q-text" id="qText"></h2>
        <div class="opts" id="qOpts"></div>
        <div class="answer-reveal" id="answerReveal"></div>
        <div class="presenter-row">
          <button class="btn-nav" id="btnPrev">Previous</button>
          <button class="btn-reveal" id="btnReveal">Reveal Answer</button>
          <button class="btn-nav" id="btnNext">Next Question</button>
        </div>
      </div>
    </section>

    <!-- RESULTS SCREEN -->
    <section class="screen" id="screenResults">
      <div class="result-card">
        <div class="result-icon"><svg viewBox="0 0 24 24"><use href="#i-trophy"/></svg></div>
        <h2 class="hero-title" style="margin-bottom:12px;">Quiz Complete!</h2>
        <p class="result-msg">You finished all <span id="resultTotal">38</span> questions. JazakAllah khair for participating!</p>
        <div class="btn-row">
          <button class="btn btn-primary" id="btnRestart">Start Over</button>
        </div>
      </div>
    </section>

  </div>

</div>

<script>
/* ---------------------------------------------------
   DATA
--------------------------------------------------- */
const QUESTIONS = [
  {type:'mcq', tag:'Hadith & Narrators', q:'Who narrated the hadith "Actions are judged by intentions"?', opts:['Abu Hurairah','Umar ibn al-Khattab','Aisha bint Abi Bakr','Abdullah ibn Umar'], correct:1, note:"Umar ibn al-Khattab narrated this hadith - it's placed first in Sahih al-Bukhari for a reason."},
  {type:'mcq', tag:'Hadith & Narrators', q:'Who narrated the most hadith among the Companions?', opts:['Abdullah ibn Abbas','Abdullah ibn Umar','Abu Hurairah','Anas ibn Malik'], correct:2, note:'Abu Hurairah stayed close to the Prophet (s.a.w) and narrated more hadith than any other Companion.'},
  {type:'mcq', tag:'Key Terms', q:'What does "isnad" refer to?', opts:['The text of the hadith','The chapter title','The chain of narrators','The explanation'], correct:2, note:'Isnad is the chain of narrators that carries a hadith back to the Prophet (s.a.w).'},
  {type:'mcq', tag:'Key Terms', q:'What does "matn" refer to?', opts:['The chain of narrators','The actual text of the hadith','The compiler','The commentary'], correct:1, note:'Matn is the actual wording being narrated, as opposed to the chain that carries it.'},
  {type:'mcq', tag:'Complete the Hadith', q:'Complete the hadith: "Religion is ________."', opts:['Worship','Sincerity (Nasihah)','Prayer','Knowledge'], correct:1, note:'The Prophet (s.a.w) defined religion itself as sincerity - to Allah, His Book, His Messenger, and the believers.'},
  {type:'mcq', tag:'Companions', q:'Which Companion was known as "the scholar of the Ummah"?', opts:['Abdullah ibn Abbas','Abu Hurairah','Bilal ibn Rabah','Salman al-Farisi'], correct:0, note:'Ibn Abbas was so deeply learned in Qur\'an and Hadith that this title stayed with him.'},
  {type:'mcq', tag:'Complete the Hadith', q:'Complete the hadith: "Allah does not look at your appearance or wealth, but He looks at your hearts and your ________."', opts:['Knowledge','Actions','Families','Intentions'], correct:1, note:'Outward appearance carries little weight - Allah weighs the heart and the deeds.'},
  {type:'mcq', tag:'Companions', q:'Which Companion served the Prophet (s.a.w) for approximately ten years and narrated many hadiths?', opts:['Anas ibn Malik','Abu Hurairah','Abdullah ibn Umar','Muadh ibn Jabal'], correct:0, note:'Anas ibn Malik served the Prophet (s.a.w) from childhood, preserving countless details of his daily life.'},
  {type:'mcq', tag:'Sahih al-Bukhari', q:"What is the title of Imam al-Bukhari's famous collection?", opts:['Al-Muwatta','Sahih Muslim',"Al-Jami' al-Sahih",'Sunan Abi Dawud'], correct:2, note:'"Sahih al-Bukhari" is the short name - the full title is Al-Jami\' al-Sahih.'},
  {type:'mcq', tag:'Companions', q:'Which female Companion is among the greatest narrators of hadith?', opts:['Khadijah bint Khuwaylid','Aisha bint Abi Bakr','Hafsa bint Umar','Umm Salama'], correct:1, note:"Aisha (RA) is one of the most prolific and trusted narrators in all of hadith literature."},
  {type:'mcq', tag:'Sahih al-Bukhari', q:'Sahih al-Bukhari includes teachings on:', opts:['Family life','Ethics','Worship','All of the above'], correct:3, note:"Bukhari's scope is vast - worship, ethics, and family life all sit inside one collection."},
  {type:'mcq', tag:'Why We Study', q:'What is one goal of studying hadith?', opts:['Understanding how the Prophet (s.a.w) explained and applied the Qur\'an','Following the Prophet (s.a.w) more closely','Mastering the sciences of narrator criticism and authentication','Preserving the Sunnah accurately for the Muslim community'], correct:1, note:"Studying hadith isn't an academic exercise - it's a path to walking closer to the example of the Prophet (s.a.w)."},
  {type:'mcq', tag:'Why We Study', q:'Authentic hadith help Muslims understand how to:', opts:['Apply the Qur\'an\'s teachings in daily life','Replace the Qur\'an in worship','Learn only about ancient history','Win arguments against others'], correct:0, note:'Hadith show us how the Prophet (s.a.w) put the Qur\'an into practice - that is why we study them.'},
  {type:'mcq', tag:'Sahih al-Bukhari', q:'Imam al-Bukhari traveled extensively to:', opts:['Trade goods','Collect and verify hadith','Serve as a ruler','Build libraries'], correct:1, note:'He is said to have traveled across the Muslim world for years gathering and verifying hadith.'},
  {type:'mcq', tag:'Why We Study', q:'Proper adab (etiquette) when studying hadith includes:', opts:['Humility, respect, and intention to benefit','Memorizing without understanding','Sharing narrations without care','Studying only to impress others'], correct:0, note:'Sacred knowledge deserves reverence - we seek it with humility and the intention to grow, not to show off.'},
  {type:'mcq', tag:'Why We Study', q:'What should be the ultimate objective of studying Sahih al-Bukhari?', opts:['Academic achievement only','Memorization only',"Seeking Allah's pleasure and following the Sunnah",'Social status'], correct:2, note:"Everything in this kind of study points toward one goal: pleasing Allah by living the Sunnah."},

/* ---------------------------------------------------
   STATE (presenter mode for Zoom)
--------------------------------------------------- */
let current = 0;
let revealed = false;

const LETTERS = 'ABCDEF';
const KAHOOT_CLASS = ['c-red','c-blue','c-yellow','c-green'];

const els = {
  start: document.getElementById('screenStart'),
  quiz: document.getElementById('screenQuiz'),
  results: document.getElementById('screenResults'),
  qTag: document.getElementById('qTag'),
  qCount: document.getElementById('qCount'),
  qText: document.getElementById('qText'),
  qOpts: document.getElementById('qOpts'),
  answerReveal: document.getElementById('answerReveal'),
  btnPrev: document.getElementById('btnPrev'),
  btnReveal: document.getElementById('btnReveal'),
  btnNext: document.getElementById('btnNext'),
  progressTrack: document.getElementById('progressTrack'),
  progressFill: document.getElementById('progressFill'),
  resultTotal: document.getElementById('resultTotal'),
};

function getOptionLabels(data){
  const opts = data.type === 'tf' ? ['True','False'] : data.opts;
  return opts.map((_, i) => LETTERS[i]);
}

function getCorrectLabels(data){
  const labels = getOptionLabels(data);
  const indices = Array.isArray(data.correct) ? data.correct : [data.correct];
  return indices.map(i => labels[i]);
}

function showScreen(name){
  [els.start, els.quiz, els.results].forEach(s => s.classList.remove('active'));
  ({start: els.start, quiz: els.quiz, results: els.results}[name]).classList.add('active');
  document.body.classList.toggle('quiz-mode', name === 'quiz');
}

function renderQuestion(){
  revealed = false;
  const data = QUESTIONS[current];
  els.qTag.textContent = data.tag;
  els.qCount.textContent = `Question ${current + 1} of ${QUESTIONS.length}`;
  els.qText.textContent = data.q;
  els.progressFill.style.width = `${(current / QUESTIONS.length) * 100}%`;

  els.answerReveal.classList.remove('show');
  els.answerReveal.innerHTML = '';
  els.btnReveal.disabled = false;
  els.btnPrev.disabled = current === 0;
  els.btnNext.textContent = current === QUESTIONS.length - 1 ? 'Finish Quiz' : 'Next Question';

  els.qOpts.innerHTML = '';
  const opts = data.type === 'tf' ? ['True','False'] : data.opts;
  const layout = data.type === 'tf' ? 'tf' : data.type === 'ms' ? 'ms' : 'mcq';
  els.qOpts.className = 'opts ' + layout + ' count-' + opts.length;

  opts.forEach((text, idx) => {
    const row = document.createElement('div');
    row.className = 'opt';
    if(data.type === 'tf'){
      row.classList.add(idx === 0 ? 'c-green' : 'c-red');
    } else {
      row.classList.add(KAHOOT_CLASS[idx % 4]);
    }
    row.innerHTML = `<span class="opt-letter">${LETTERS[idx]}</span><span class="opt-text">${text}</span>`;
    els.qOpts.appendChild(row);
  });
}

function revealAnswer(){
  if(revealed) return;
  revealed = true;
  const data = QUESTIONS[current];
  const correctSet = new Set(Array.isArray(data.correct) ? data.correct : [data.correct]);
  const correctLabels = getCorrectLabels(data).join(', ');

  [...els.qOpts.children].forEach((row, i) => {
    if(correctSet.has(i)){
      row.classList.add('is-correct');
    } else {
      row.classList.add('dim');
    }
  });

  els.answerReveal.innerHTML = `<b>Correct answer: ${correctLabels}</b> - ${data.note}`;
  els.answerReveal.classList.add('show');
  els.btnReveal.disabled = true;
}

function prevQuestion(){
  if(current > 0){
    current--;
    renderQuestion();
  }
}

function nextQuestion(){
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz(){
  els.progressFill.style.width = '100%';
  els.resultTotal.textContent = QUESTIONS.length;
  showScreen('results');
  els.progressTrack.style.display = 'none';
  document.body.classList.remove('quiz-mode');
}

function restartQuiz(){
  current = 0;
  els.progressTrack.style.display = 'block';
  showScreen('start');
  document.body.classList.remove('quiz-mode');
}

function startQuiz(){
  current = 0;
  els.progressTrack.style.display = 'block';
  showScreen('quiz');
  renderQuestion();
}

document.getElementById('btnStart').addEventListener('click', startQuiz);
els.btnPrev.addEventListener('click', prevQuestion);
els.btnReveal.addEventListener('click', revealAnswer);
els.btnNext.addEventListener('click', nextQuestion);
document.getElementById('btnRestart').addEventListener('click', restartQuiz);

document.addEventListener('keydown', (e) => {
  if(!els.quiz.classList.contains('active')) return;
  if(e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') nextQuestion();
  if(e.key === 'ArrowLeft' || e.key === 'p' || e.key === 'P') prevQuestion();
  if(e.key === 'r' || e.key === 'R' || e.key === ' ') { e.preventDefault(); revealAnswer(); }
});
</script>
